env_module: "policy.envs.target_env_pool:TargetEnv"
env_name: "TargetEnv"
num_parallel: 512
num_parallel_test: 1

max_timestep: 300
max_timestep_test: 2000
frame_skip: 1

#text: ['sidestep', 'forward', 'backward', 'stand still',',']

